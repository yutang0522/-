<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw 自动化月报</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0f0f10;color:#e8e6e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:2rem 1.5rem;min-height:100vh;}

.kb-header{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:1.5rem;}
.kb-title{font-size:20px;font-weight:500;color:#fff;}
.kb-sub{font-size:12px;color:rgba(255,255,255,0.35);margin-top:4px;}
.kb-right{display:flex;align-items:center;gap:10px;}
.status-badge{font-size:11px;padding:5px 12px;border-radius:8px;display:flex;align-items:center;gap:6px;background:#1a1a1b;color:rgba(255,255,255,0.4);}
.status-badge.ok{background:#04342C;color:#9FE1CB;}
.status-badge.err{background:#4A1B0C;color:#F5C4B3;}
.status-badge.loading{background:#26215C;color:#CECBF6;}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor;}
.dot.blink{animation:blink 1.2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}
.btn{font-size:11px;padding:5px 14px;border-radius:8px;border:0.5px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.6);cursor:pointer;}
.btn:hover{background:rgba(255,255,255,0.08);}

.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.5rem;}
@media(max-width:600px){.metrics{grid-template-columns:repeat(2,1fr);}}
.mc{border-radius:10px;padding:14px 16px;}
.mc-pu{background:#26215C;}.mc-te{background:#04342C;}.mc-co{background:#4A1B0C;}.mc-gr{background:#2C2C2A;}
.mc-label{font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:6px;}
.mc-val{font-size:22px;font-weight:500;color:#fff;line-height:1.1;}
.mc-note{font-size:10px;margin-top:4px;color:rgba(255,255,255,0.3);}
.mc-up{color:#5DCAA5;}

.kanban{display:grid;gap:14px;margin-bottom:1.5rem;}
.week-col{background:#161617;border:0.5px solid rgba(255,255,255,0.07);border-radius:14px;overflow:hidden;}
.week-head{padding:12px 16px;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;}
.week-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.week-body{padding:0 12px 12px;}

.section{margin-top:10px;}
.section-title{font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;padding:6px 10px;border-radius:6px;margin-bottom:6px;display:inline-block;}
.st-1{background:#26215C;color:#AFA9EC;}
.st-2{background:#085041;color:#5DCAA5;}
.st-3{background:#2C2C2A;color:#888780;}
.st-4{background:#4A1B0C;color:#F0997B;}
.st-5{background:#3C3489;color:#CECBF6;}

.card{background:#1e1e1f;border:0.5px solid rgba(255,255,255,0.07);border-radius:10px;padding:10px 12px;margin-bottom:6px;}
.stat-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:0.5px solid rgba(255,255,255,0.06);}
.stat-row:last-child{border-bottom:none;}
.sk{font-size:11px;color:rgba(255,255,255,0.38);}
.sv{font-size:11px;font-weight:500;color:#e8e6e0;}

.prog-title{font-size:12px;font-weight:500;color:#e8e6e0;margin-bottom:5px;}
.prog-desc{font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:4px;line-height:1.55;}
.prog-result{font-size:11px;color:#9FE1CB;line-height:1.55;}
.prog-result::before{content:"→ ";opacity:0.6;}

.risk-item{font-size:11px;color:rgba(255,255,255,0.45);line-height:1.6;padding:3px 0;border-bottom:0.5px solid rgba(255,255,255,0.05);}
.risk-item:last-child{border-bottom:none;}
.risk-label{font-size:10px;font-weight:500;color:#F0997B;margin-bottom:4px;}

.plan-item{display:flex;gap:8px;padding:4px 0;border-bottom:0.5px solid rgba(255,255,255,0.05);}
.plan-item:last-child{border-bottom:none;}
.plan-num{font-size:10px;font-weight:500;color:#7F77DD;flex-shrink:0;margin-top:1px;}
.plan-text{font-size:11px;color:rgba(255,255,255,0.5);line-height:1.55;}

.func-tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:6px;background:#1a1a1b;border:0.5px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.4);margin:2px 2px;}

.two{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:1.5rem;}
@media(max-width:600px){.two{grid-template-columns:1fr;}}
.cw{position:relative;width:100%;height:190px;}
.chart-card{background:#161617;border:0.5px solid rgba(255,255,255,0.07);border-radius:12px;padding:14px 16px;}
.chart-title{font-size:12px;font-weight:500;color:#e8e6e0;margin-bottom:12px;}

.divider{border:none;border-top:0.5px solid rgba(255,255,255,0.07);margin:1.25rem 0;}
.sec-label{font-size:11px;font-weight:500;color:rgba(255,255,255,0.3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;}
.badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.badge{font-size:10px;padding:3px 10px;border-radius:8px;background:#1a1a1b;color:rgba(255,255,255,0.4);border:0.5px solid rgba(255,255,255,0.1);}
</style>
</head>
<body>

<div class="kb-header">
  <div>
    <div class="kb-title">OpenClaw 自动化月报</div>
    <div class="kb-sub">商务中心 · 客服组 · 负责人：雨棠</div>
  </div>
  <div class="kb-right">
    <div class="status-badge loading" id="statusBadge">
      <span class="dot blink"></span>
      <span id="statusText">读取中...</span>
    </div>
    <button class="btn" onclick="loadData()">重新整理</button>
  </div>
</div>

<div class="metrics" id="metricsArea">
  <div class="mc mc-pu"><div class="mc-label">月度总触发</div><div class="mc-val">—</div></div>
  <div class="mc mc-te"><div class="mc-label">综合成功率</div><div class="mc-val">—</div></div>
  <div class="mc mc-co"><div class="mc-label">总字符消耗</div><div class="mc-val">—</div></div>
  <div class="mc mc-gr"><div class="mc-label">活跃智能体</div><div class="mc-val">—</div></div>
</div>

<div class="sec-label">周度看板</div>
<div class="kanban" id="kanbanArea">
  <div style="text-align:center;padding:3rem;color:rgba(255,255,255,0.2);font-size:13px;">载入中...</div>
</div>

<div class="divider"></div>
<div class="sec-label">趋势图表</div>
<div class="two">
  <div class="chart-card">
    <div class="chart-title">任务触发次数</div>
    <div class="cw"><canvas id="c1" role="img" aria-label="各周触发次数">各周触发次数</canvas></div>
  </div>
  <div class="chart-card">
    <div class="chart-title">任务执行成功率</div>
    <div class="cw"><canvas id="c2" role="img" aria-label="各周成功率">各周成功率</canvas></div>
  </div>
</div>

<div class="divider"></div>
<div style="font-size:11px;color:rgba(255,255,255,0.3);">高频指令
  <div class="badges">
    <span class="badge">/T1</span><span class="badge">/T1E</span><span class="badge">/T1W</span>
    <span class="badge">/daily</span><span class="badge">/dailydd</span>
    <span class="badge">/WS</span><span class="badge">/WR</span>
    <span class="badge">/QWS</span><span class="badge">/CWS</span><span class="badge">/XWS</span>
  </div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR4MZC5X5HMRykJcEJ79oPYOsld-qLeiDfkPp2vDf661UR6r5Tp15xuJVYtRzQrMC94AUIvx3cSO6XK/pub?output=csv';

const WEEK_COLORS = [
  {head:'#3C3489',txt:'#CECBF6',dot:'#AFA9EC'},
  {head:'#085041',txt:'#9FE1CB',dot:'#5DCAA5'},
  {head:'#712B13',txt:'#F5C4B3',dot:'#F0997B'},
  {head:'#633806',txt:'#FAC775',dot:'#EF9F27'},
  {head:'#2C2C2A',txt:'#D3D1C7',dot:'#888780'},
];

let chart1=null, chart2=null;

function setStatus(type, text){
  const b = document.getElementById('statusBadge');
  b.className = 'status-badge ' + type;
  b.innerHTML = `<span class="dot${type==='loading'?' blink':''}"></span><span>${text}</span>`;
}

function parseRows(results){
  const rows = results.data;
  if(!rows || rows.length < 2) return null;
  const headers = rows[0].map(h => h.trim());
  return rows.slice(1).filter(r => r.some(c => c && c.trim())).map(r => {
    const obj = {};
    headers.forEach((h, i) => obj[h] = (r[i] || '').trim());
    obj['触发次数'] = parseFloat(obj['触发次数']) || 0;
    obj['成功率'] = parseFloat(obj['成功率']) || 0;
    obj['字符消耗'] = parseFloat(obj['字符消耗']) || 0;
    obj['活跃智能体数'] = parseFloat(obj['活跃智能体数']) || 0;
    return obj;
  });
}

function getField(row, ...keys){
  for(const k of keys){
    if(row[k] && row[k].trim()) return row[k].trim();
  }
  return '';
}

function renderMetrics(data){
  const total = data.reduce((s,r) => s + r['触发次数'], 0);
  const avgRate = (data.reduce((s,r) => s + r['成功率'], 0) / data.length).toFixed(1);
  const totalChar = data.reduce((s,r) => s + r['字符消耗'], 0);
  const maxAgents = Math.max(...data.map(r => r['活跃智能体数']));
  const best = data.reduce((a,b) => a['成功率'] > b['成功率'] ? a : b);
  document.getElementById('metricsArea').innerHTML = `
    <div class="mc mc-pu"><div class="mc-label">月度总触发</div><div class="mc-val">${total.toLocaleString()}</div><div class="mc-note">${data.length} 周累计</div></div>
    <div class="mc mc-te"><div class="mc-label">综合成功率</div><div class="mc-val">${avgRate}%</div><div class="mc-note mc-up">最高 ${best['成功率']}%（${best['周次']}）</div></div>
    <div class="mc mc-co"><div class="mc-label">总字符消耗</div><div class="mc-val">${totalChar.toLocaleString()}</div><div class="mc-note">${data.length} 周累计</div></div>
    <div class="mc mc-gr"><div class="mc-label">活跃智能体</div><div class="mc-val">${maxAgents}</div><div class="mc-note">当前最大值</div></div>`;
}

function renderWeekCard(row, i){
  const c = WEEK_COLORS[i % WEEK_COLORS.length];

  // 一、运行数据
  const sec1 = `
    <div class="section">
      <span class="section-title st-1">一、运行数据概览</span>
      <div class="card">
        <div class="stat-row"><span class="sk">活跃智能体</span><span class="sv">${row['活跃智能体数']} 个</span></div>
        <div class="stat-row"><span class="sk">触发次数</span><span class="sv">${row['触发次数']} 次</span></div>
        <div class="stat-row"><span class="sk">成功率</span><span class="sv">${row['成功率']}%</span></div>
        <div class="stat-row"><span class="sk">字符消耗</span><span class="sv">${Number(row['字符消耗']).toLocaleString()}</span></div>
        <div class="stat-row"><span class="sk">平均响应</span><span class="sv">${row['平均响应']}</span></div>
      </div>
    </div>`;

  // 二、核心自动化进展（最多3项）
  let progs = '';
  for(let n = 1; n <= 3; n++){
    const title = getField(row, n===1?'▲描述':n===2?'▲描述_1':'▲描述_2') || '';
    // 尝试多种可能的栏位名称
    const keys = Object.keys(row);
    const descKeys = keys.filter(k => k.includes('描述'));
    const resultKeys = keys.filter(k => k.includes('成果'));
    if(n-1 < descKeys.length || n-1 < resultKeys.length){
      const t = keys.filter(k => !k.includes('描述') && !k.includes('成果') && !['周次','汇报周期','负责人','部门','活跃智能体数','触发次数','成功率','字符消耗','平均响应','高频功能调用','异常记录','优化对策'].includes(k) && !k.includes('计划'));
      // 取进展标题（奇数位非描述非成果栏）
    }
  }

  // 重新解析：找所有进展组
  const allKeys = Object.keys(row);
  const descKeys = allKeys.filter(k => k.trim().startsWith('▲') && k.includes('描述'));
  const resultKeys = allKeys.filter(k => k.trim().startsWith('▲') && k.includes('成果'));
  // 进展标题是描述之前的非系统栏位
  const sysKeys = new Set(['周次','汇报周期','负责人','部门','活跃智能体数','触发次数','成功率','字符消耗','平均响应','高频功能调用','异常记录','优化对策']);
  const planKeys = allKeys.filter(k => k.trim().startsWith('★'));
  const progTitleKeys = allKeys.filter(k => !sysKeys.has(k) && !k.startsWith('▲') && !k.startsWith('★'));

  let sec2Html = '';
  const maxProgs = Math.max(descKeys.length, resultKeys.length, progTitleKeys.length);
  for(let n = 0; n < Math.min(maxProgs, 3); n++){
    const ptKey = progTitleKeys[n];
    const dKey = descKeys[n];
    const rKey = resultKeys[n];
    const pt = ptKey ? row[ptKey] : '';
    const desc = dKey ? row[dKey] : '';
    const res = rKey ? row[rKey] : '';
    if(!pt && !desc && !res) continue;
    sec2Html += `<div class="card">
      ${pt ? `<div class="prog-title">${pt}</div>` : ''}
      ${desc ? `<div class="prog-desc">${desc}</div>` : ''}
      ${res ? `<div class="prog-result">${res}</div>` : ''}
    </div>`;
  }

  const sec2 = sec2Html ? `<div class="section"><span class="section-title st-2">二、核心自动化进展</span>${sec2Html}</div>` : '';

  // 三、资源消耗
  const funcs = row['高频功能调用'] || '';
  const sec3 = funcs ? `
    <div class="section">
      <span class="section-title st-3">三、资源消耗与成本</span>
      <div class="card">
        <div class="risk-label">高频功能调用</div>
        <div style="display:flex;flex-wrap:wrap;">
          ${funcs.split(/[，,、]/).map(f => f.trim() ? `<span class="func-tag">${f.trim()}</span>` : '').join('')}
        </div>
      </div>
    </div>` : '';

  // 四、风险记录
  const abnormal = row['异常记录'] || '';
  const optimize = row['优化对策'] || '';
  const sec4 = (abnormal || optimize) ? `
    <div class="section">
      <span class="section-title st-4">四、风险记录与优化</span>
      <div class="card">
        ${abnormal ? `<div class="risk-label">异常记录</div><div class="risk-item">${abnormal}</div>` : ''}
        ${optimize ? `<div class="risk-label" style="margin-top:8px;">优化对策</div><div class="risk-item">${optimize}</div>` : ''}
      </div>
    </div>` : '';

  // 五、演进计划
  const plans = planKeys.map(k => row[k]).filter(Boolean);
  let plansHtml = plans.map((p, idx) => `
    <div class="plan-item">
      <span class="plan-num">${idx+1}.</span>
      <span class="plan-text">${p}</span>
    </div>`).join('');
  const sec5 = plansHtml ? `
    <div class="section">
      <span class="section-title st-5">五、下周演进计划</span>
      <div class="card">${plansHtml}</div>
    </div>` : '';

  return `
    <div class="week-col">
      <div class="week-head" style="background:${c.head};color:${c.txt}">
        <span class="week-dot" style="background:${c.dot}"></span>
        ${row['周次']} &nbsp;·&nbsp; ${row['汇报周期'] || ''}
      </div>
      <div class="week-body">
        ${sec1}${sec2}${sec3}${sec4}${sec5}
      </div>
    </div>`;
}

function renderKanban(data){
  const kb = document.getElementById('kanbanArea');
  const cols = Math.min(data.length, 3);
  kb.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  kb.innerHTML = data.map((row, i) => renderWeekCard(row, i)).join('');
}

function renderCharts(data){
  const tc = 'rgba(255,255,255,0.35)';
  const gc = 'rgba(255,255,255,0.06)';
  const labels = data.map(r => r['周次']);
  const base = {responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:tc,font:{size:11}},grid:{color:gc},border:{display:false}},y:{ticks:{color:tc,font:{size:11}},grid:{color:gc},border:{display:false}}}};
  const barColors = data.map((_,i) => ['#3C3489','#085041','#712B13','#633806','#2C2C2A'][i%5]);
  if(chart1) chart1.destroy();
  if(chart2) chart2.destroy();
  chart1 = new Chart(document.getElementById('c1'), {type:'bar', data:{labels, datasets:[{data:data.map(r=>r['触发次数']), backgroundColor:barColors, borderRadius:5}]}, options:base});
  chart2 = new Chart(document.getElementById('c2'), {type:'line', data:{labels, datasets:[{data:data.map(r=>r['成功率']), borderColor:'#7F77DD', backgroundColor:'rgba(127,119,221,0.12)', pointBackgroundColor:'#7F77DD', pointRadius:5, tension:0.3, fill:true}]}, options:{...base, scales:{...base.scales, y:{...base.scales.y, min:60, max:100, ticks:{...base.scales.y.ticks, callback:v=>v+'%'}}}}});
}

async function loadData(){
  setStatus('loading', '读取中...');
  try{
    const res = await fetch(CSV_URL);
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const parsed = Papa.parse(text, {skipEmptyLines:true});
    const data = parseRows(parsed);
    if(!data || data.length === 0) throw new Error('无数据');
    renderMetrics(data);
    renderKanban(data);
    renderCharts(data);
    const now = new Date().toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'});
    setStatus('ok', '已同步 ' + now);
  }catch(e){
    setStatus('err', '读取失败：' + e.message);
  }
}

loadData();
</script>
</body>
</html>
