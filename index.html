<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw 自动化月报</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
/* ── 配色变量：主色 #f472b6（玫瑰粉）· 点缀 #fb7185（珊瑚红） ── */
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0f0b10;color:#f0e6eb;font-family:'Noto Sans TC',sans-serif;padding:2rem 1.5rem;min-height:100vh;}
@media(max-width:700px){body{padding:1rem;}}
.top-bar{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:1.5rem;}
.live-dot{width:8px;height:8px;border-radius:50%;background:#f472b6;animation:blink 1.5s infinite;flex-shrink:0;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
.top-title{font-size:20px;font-weight:500;color:#fff;}
.top-sub{font-size:12px;color:rgba(203,213,225,0.5);margin-top:3px;}
.top-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.pill{font-size:12px;padding:5px 14px;border-radius:20px;border:0.5px solid rgba(244,114,182,0.35);color:#f9a8d4;background:rgba(244,114,182,0.08);cursor:pointer;}
.pill:hover{background:rgba(244,114,182,0.16);}
.pill-report{font-size:12px;padding:5px 14px;border-radius:20px;border:0.5px solid rgba(251,113,133,0.45);color:#fda4af;background:rgba(251,113,133,0.1);cursor:pointer;display:flex;align-items:center;gap:6px;}
.pill-report:hover{background:rgba(251,113,133,0.18);}
.report-icon{width:12px;height:12px;border:1.5px solid currentColor;border-radius:2px;flex-shrink:0;}
.status-badge{font-size:12px;padding:5px 12px;border-radius:20px;display:flex;align-items:center;gap:6px;background:#1a0f14;color:rgba(255,255,255,0.35);}
.status-badge.ok{background:rgba(244,114,182,0.1);color:#f9a8d4;border:0.5px solid rgba(244,114,182,0.3);}
.status-badge.err{background:rgba(251,100,80,0.1);color:#fca5a5;border:0.5px solid rgba(251,100,80,0.25);}
.status-badge.loading{background:rgba(251,113,133,0.1);color:#fda4af;border:0.5px solid rgba(251,113,133,0.3);}
.sdot{width:6px;height:6px;border-radius:50%;background:currentColor;}
.sdot.blink{animation:blink 1.2s infinite;}
.sec-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.sec-line{width:3px;height:14px;border-radius:2px;background:#f472b6;flex-shrink:0;}
.sec-title{font-size:13px;font-weight:500;color:#fff;letter-spacing:.06em;text-transform:uppercase;}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.5rem;}
@media(max-width:600px){.metrics{grid-template-columns:repeat(2,1fr);}}
.mc{background:#1a0f14;border-radius:10px;padding:14px 16px;border:0.5px solid rgba(244,114,182,0.12);}
.mc-bar{height:2px;border-radius:2px;margin-bottom:10px;}
.b1{background:linear-gradient(90deg,#f472b6,#a78bfa);}
.b2{background:linear-gradient(90deg,#a78bfa,#60a5fa);}
.b3{background:linear-gradient(90deg,#60a5fa,#34d399);}
.b4{background:linear-gradient(90deg,#34d399,#fb923c);}
.mc-label{font-size:13px;color:#fff;margin-bottom:5px;}
.mc-val{font-size:24px;font-weight:500;color:#fff;}
.mc-note{font-size:11px;margin-top:4px;color:#94a3b8;}
.kanban{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:1.5rem;}
.week-col{background:#1a0f14;border-radius:12px;overflow:hidden;border:0.5px solid rgba(244,114,182,0.12);}
.wh-bar{height:2px;}
.week-head{padding:10px 14px;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;border-bottom:0.5px solid rgba(244,114,182,0.1);}
.week-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.week-label{color:rgba(255,255,255,0.85);}
.week-period{font-size:12px;color:rgba(255,255,255,0.35);margin-left:auto;}
.week-body{padding:10px;}
.section{margin-top:8px;}
.stag{display:inline-flex;align-items:center;font-size:12px;font-weight:500;padding:3px 9px;border-radius:20px;margin-bottom:6px;}
.s1{background:rgba(244,114,182,0.1);color:#f9a8d4;border:0.5px solid rgba(244,114,182,0.22);}
.s2{background:rgba(244,114,182,0.1);color:#f9a8d4;border:0.5px solid rgba(244,114,182,0.22);}
.s3{background:rgba(244,114,182,0.1);color:#f9a8d4;border:0.5px solid rgba(244,114,182,0.22);}
.s4{background:rgba(244,114,182,0.1);color:#f9a8d4;border:0.5px solid rgba(244,114,182,0.22);}
.s5{background:rgba(244,114,182,0.1);color:#f9a8d4;border:0.5px solid rgba(244,114,182,0.22);}
.card{background:#0f0b10;border:0.5px solid rgba(244,114,182,0.08);border-radius:8px;padding:10px 12px;margin-bottom:6px;}
.sr{display:flex;justify-content:space-between;padding:3px 0;border-bottom:0.5px solid rgba(244,114,182,0.08);}
.sr:last-child{border-bottom:none;}
.sk{font-size:13px;color:#94a3b8;}
.sv{font-size:13px;font-weight:500;color:#fff;}
.sv-hi{color:#f472b6;}
.pt{font-size:14px;font-weight:500;color:#e2e8f0;margin-bottom:4px;}
.pd{font-size:13px;color:#cbd5e1;line-height:1.6;margin-bottom:4px;}
.pr{font-size:13px;color:#a5b4fc;line-height:1.6;}
.pr::before{content:"→ ";opacity:0.7;}
.ri-label{font-size:12px;font-weight:500;color:#f9a8d4;margin-bottom:4px;}
.ri{font-size:13px;color:#e2e8f0;line-height:1.6;margin-bottom:6px;}
.ri:last-child{margin-bottom:0;}
.func-tag{display:inline-block;font-size:12px;padding:2px 8px;border-radius:6px;background:rgba(148,163,184,0.07);border:0.5px solid rgba(148,163,184,0.18);color:#cbd5e1;margin:2px;}
.pi{display:flex;gap:4px;padding:3px 0;border-bottom:0.5px solid rgba(244,114,182,0.06);}
.pi:last-child{border-bottom:none;}
.pn{display:none;}
.pt2{font-size:13px;color:#cbd5e1;line-height:1.5;}
.two{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1.5rem;}
@media(max-width:600px){.two{grid-template-columns:1fr;}}
.chart-card{background:#1a0f14;border:0.5px solid rgba(244,114,182,0.12);border-radius:12px;padding:14px 16px;}
.chart-title{font-size:13px;font-weight:500;color:rgba(255,255,255,0.6);margin-bottom:12px;}
.cw{position:relative;width:100%;height:180px;}
.divider{border:none;border-top:0.5px solid rgba(244,114,182,0.08);margin:1.25rem 0;}
.badges{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
.badge{font-size:12px;padding:2px 9px;border-radius:20px;background:#1a0f14;color:rgba(255,255,255,0.45);border:0.5px solid rgba(244,114,182,0.14);}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:100;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto;}
.modal-overlay.show{display:flex;}
.modal{background:#1a0f14;border-radius:16px;border:0.5px solid rgba(244,114,182,0.3);width:100%;max-width:660px;}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:0.5px solid rgba(244,114,182,0.1);}
.modal-title{font-size:15px;font-weight:500;color:#fff;display:flex;align-items:center;gap:8px;}
.modal-close{font-size:12px;padding:4px 12px;border-radius:20px;border:0.5px solid rgba(255,255,255,0.15);background:transparent;color:rgba(255,255,255,0.5);cursor:pointer;}
.modal-close:hover{background:rgba(255,255,255,0.08);}
.modal-tabs{display:flex;gap:4px;padding:12px 20px 0;}
.tab{font-size:13px;padding:6px 16px;border-radius:8px 8px 0 0;cursor:pointer;color:rgba(255,255,255,0.4);background:transparent;border:0.5px solid transparent;}
.tab.active{background:#0f0b10;color:#f9a8d4;border-color:rgba(244,114,182,0.3);}
.tab:hover:not(.active){color:rgba(255,255,255,0.65);}
.modal-divider{border:none;border-top:0.5px solid rgba(244,114,182,0.08);}
.custom-select{padding:12px 20px;border-bottom:0.5px solid rgba(244,114,182,0.08);display:none;}
.custom-select.show{display:block;}
.custom-label{font-size:12px;color:rgba(255,255,255,0.45);margin-bottom:8px;}
.week-cbs{display:flex;flex-wrap:wrap;gap:10px;}
.week-cb{display:flex;align-items:center;gap:6px;font-size:13px;color:rgba(255,255,255,0.6);cursor:pointer;}
.week-cb input{accent-color:#f472b6;width:14px;height:14px;}
.modal-body{padding:16px 20px;}
.report-out{background:#0f0b10;border-radius:10px;border:0.5px solid rgba(244,114,182,0.08);padding:16px;font-size:13px;line-height:2;color:rgba(255,255,255,0.78);white-space:pre-wrap;font-family:'Noto Sans TC',sans-serif;min-height:200px;max-height:55vh;overflow-y:auto;}
.modal-footer{padding:12px 20px;border-top:0.5px solid rgba(244,114,182,0.08);display:flex;justify-content:flex-end;}
.btn-copy{font-size:13px;padding:6px 20px;border-radius:20px;border:0.5px solid rgba(244,114,182,0.4);color:#f9a8d4;background:rgba(244,114,182,0.1);cursor:pointer;}
.btn-copy:hover{background:rgba(244,114,182,0.2);}
.btn-copy.copied{background:rgba(251,113,133,0.15);color:#fda4af;border-color:rgba(251,113,133,0.4);}
</style>
</head>
<body>

<div class="top-bar">
  <div style="display:flex;align-items:center;gap:10px;">
    <span class="live-dot"></span>
    <div>
      <div class="top-title">OpenClaw 自动化月报</div>
      <div class="top-sub" id="topSub">商务中心 · 客服组 · 负责人：雨棠</div>
    </div>
  </div>
  <div class="top-right">
    <div class="status-badge loading" id="statusBadge">
      <span class="sdot blink"></span>
      <span id="statusText">读取中...</span>
    </div>
    <button class="pill-report" onclick="openReport()">
      <span class="report-icon"></span>产出报告
    </button>
    <button class="pill" onclick="loadData()">重新整理</button>
  </div>
</div>

<div class="sec-head"><span class="sec-line"></span><span class="sec-title">关键指标总览</span></div>
<div class="metrics" id="metricsArea">
  <div class="mc"><div class="mc-bar b1"></div><div class="mc-label">月度总触发</div><div class="mc-val">—</div></div>
  <div class="mc"><div class="mc-bar b2"></div><div class="mc-label">综合成功率</div><div class="mc-val">—</div></div>
  <div class="mc"><div class="mc-bar b3"></div><div class="mc-label">总字符消耗</div><div class="mc-val">—</div></div>
  <div class="mc"><div class="mc-bar b4"></div><div class="mc-label">活跃智能体</div><div class="mc-val">—</div></div>
</div>

<div class="sec-head"><span class="sec-line"></span><span class="sec-title">周度看板</span></div>
<div class="kanban" id="kanbanArea">
  <div style="text-align:center;padding:3rem;color:rgba(255,255,255,0.2);font-size:13px;">载入中...</div>
</div>

<div class="divider"></div>
<div class="sec-head"><span class="sec-line"></span><span class="sec-title">趋势图表</span></div>
<div class="two">
  <div class="chart-card"><div class="chart-title">任务触发次数</div><div class="cw"><canvas id="c1" role="img" aria-label="各周触发次数">各周触发次数</canvas></div></div>
  <div class="chart-card"><div class="chart-title">任务执行成功率</div><div class="cw"><canvas id="c2" role="img" aria-label="各周成功率">各周成功率</canvas></div></div>
</div>

<div class="divider"></div>
<div style="font-size:11px;color:rgba(255,255,255,0.4);">高频指令
  <div class="badges">
    <span class="badge">/T1</span><span class="badge">/T1E</span><span class="badge">/T1W</span>
    <span class="badge">/daily</span><span class="badge">/dailydd</span>
    <span class="badge">/WS</span><span class="badge">/WR</span>
    <span class="badge">/QWS</span><span class="badge">/CWS</span><span class="badge">/XWS</span>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeIfOutside(event)">
  <div class="modal" id="modalBox">
    <div class="modal-header">
      <div class="modal-title"><span class="report-icon"></span>产出报告</div>
      <button class="modal-close" onclick="closeReport()">✕ 关闭</button>
    </div>
    <div class="modal-tabs">
      <div class="tab active" id="tab-week" onclick="switchTab('week')">本周</div>
      <div class="tab" id="tab-month" onclick="switchTab('month')">本月汇总</div>
      <div class="tab" id="tab-custom" onclick="switchTab('custom')">自定义</div>
    </div>
    <div class="modal-divider"></div>
    <div class="custom-select" id="customSelect">
      <div class="custom-label">选择要包含的周次：</div>
      <div class="week-cbs" id="weekCbs"></div>
    </div>
    <div class="modal-body">
      <div class="report-out" id="reportOut">请先载入数据...</div>
    </div>
    <div class="modal-footer">
      <button class="btn-copy" id="copyBtn" onclick="copyReport()">复制全文</button>
    </div>
  </div>
</div>

<script>
const CSV_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vR4MZC5X5HMRykJcEJ79oPYOsld-qLeiDfkPp2vDf661UR6r5Tp15xuJVYtRzQrMC94AUIvx3cSO6XK/pub?output=csv';
const WEEK_COLORS=[
  {dot:'#f472b6',bar:'linear-gradient(90deg,#f472b6,#a78bfa,#60a5fa,#34d399)'},
  {dot:'#a78bfa',bar:'linear-gradient(90deg,#a78bfa,#60a5fa,#34d399,#f472b6)'},
  {dot:'#60a5fa',bar:'linear-gradient(90deg,#60a5fa,#34d399,#f472b6,#a78bfa)'},
  {dot:'#34d399',bar:'linear-gradient(90deg,#34d399,#f472b6,#a78bfa,#60a5fa)'},
  {dot:'#fb923c',bar:'linear-gradient(90deg,#fb923c,#f472b6,#a78bfa,#60a5fa)'},
];
const CHART_COLORS=['#f472b6','#a78bfa','#60a5fa','#34d399','#fb923c'];
let chart1=null,chart2=null,allData=[],currentTab='week';

function setStatus(type,text){
  const b=document.getElementById('statusBadge');
  b.className='status-badge '+type;
  b.innerHTML=`<span class="sdot${type==='loading'?' blink':''}"></span><span>${text}</span>`;
}

function parseRows(results){
  const rows=results.data;
  if(!rows||rows.length<2)return null;
  const headers=rows[0].map(h=>h.trim());
  return rows.slice(1).filter(r=>r.some(c=>c&&c.trim())).map(r=>{
    const obj={};
    headers.forEach((h,i)=>obj[h]=(r[i]||'').trim());
    obj['触发次数']=parseFloat(obj['触发次数'])||0;
    obj['成功率']=parseFloat(obj['成功率'])||0;
    obj['字符消耗']=parseFloat(obj['字符消耗'])||0;
    obj['活跃智能体数']=parseFloat(obj['活跃智能体数'])||0;
    return obj;
  });
}

// ✅ 修正：正确识别 ▲ 开头的进展标题栏位
function getProgKeys(row){
  const allKeys=Object.keys(row);
  return {
    descKeys:allKeys.filter(k=>k.includes('描述')),
    resultKeys:allKeys.filter(k=>k.includes('成果')),
    planKeys:allKeys.filter(k=>k.startsWith('★')),
    progTitleKeys:allKeys.filter(k=>k.startsWith('▲'))
  };
}

function renderMetrics(data){
  const total=data.reduce((s,r)=>s+r['触发次数'],0);
  const avgRate=(data.reduce((s,r)=>s+r['成功率'],0)/data.length).toFixed(1);
  const totalChar=data.reduce((s,r)=>s+r['字符消耗'],0);
  const maxAgents=Math.max(...data.map(r=>r['活跃智能体数']));
  const best=data.reduce((a,b)=>a['成功率']>b['成功率']?a:b);
  document.getElementById('metricsArea').innerHTML=`
    <div class="mc"><div class="mc-bar b1"></div><div class="mc-label">月度总触发</div><div class="mc-val">${total.toLocaleString()}</div><div class="mc-note">${data.length} 周累计</div></div>
    <div class="mc"><div class="mc-bar b2"></div><div class="mc-label">综合成功率</div><div class="mc-val">${avgRate}%</div><div class="mc-note">最高 ${best['成功率']}%（${best['周次']}）</div></div>
    <div class="mc"><div class="mc-bar b3"></div><div class="mc-label">总字符消耗</div><div class="mc-val">${totalChar.toLocaleString()}</div><div class="mc-note">${data.length} 周累计</div></div>
    <div class="mc"><div class="mc-bar b4"></div><div class="mc-label">活跃智能体</div><div class="mc-val">${maxAgents}</div><div class="mc-note">当前最大值</div></div>`;
}

function renderWeekCard(row,i){
  const c=WEEK_COLORS[i%WEEK_COLORS.length];
  const {descKeys,resultKeys,planKeys,progTitleKeys}=getProgKeys(row);
  const sec1=`<div class="section"><span class="stag s1">一、运行数据概览</span><div class="card">
    <div class="sr"><span class="sk">活跃智能体</span><span class="sv">${row['活跃智能体数']} 个</span></div>
    <div class="sr"><span class="sk">触发次数</span><span class="sv">${row['触发次数']} 次</span></div>
    <div class="sr"><span class="sk">成功率</span><span class="sv sv-hi">${row['成功率']}%</span></div>
    <div class="sr"><span class="sk">字符消耗</span><span class="sv">${Number(row['字符消耗']).toLocaleString()}</span></div>
    <div class="sr"><span class="sk">平均响应</span><span class="sv">${row['平均响应']||'—'}</span></div>
  </div></div>`;

  // ✅ 修正：以 progTitleKeys.length 为基准迭代，正确对齐标题/描述/成果
  let progHtml='';
  for(let n=0;n<progTitleKeys.length;n++){
    const t=progTitleKeys[n]?row[progTitleKeys[n]]:'';
    const d=descKeys[n]?row[descKeys[n]]:'';
    const r=resultKeys[n]?row[resultKeys[n]]:'';
    if(!t&&!d&&!r)continue;
    progHtml+=`<div class="card">${t?`<div class="pt">${t}</div>`:''}${d?`<div class="pd">${d}</div>`:''}${r?`<div class="pr">${r}</div>`:''}</div>`;
  }
  const sec2=progHtml?`<div class="section"><span class="stag s2">二、核心自动化进展</span>${progHtml}</div>`:'';

  const funcs=row['高频功能调用']||'';
  const sec3=funcs?`<div class="section"><span class="stag s3">三、资源消耗</span><div class="card"><div style="display:flex;flex-wrap:wrap;">${funcs.split(/[，,、]/).filter(f=>f.trim()).map(f=>`<span class="func-tag">${f.trim()}</span>`).join('')}</div></div></div>`:'';

  const ab=row['异常记录']||'',op=row['优化对策']||'';
  const sec4=(ab||op)?`<div class="section"><span class="stag s4">四、风险记录与优化</span><div class="card">${ab?`<div class="ri-label">异常记录</div><div class="ri">${ab}</div>`:''}${op?`<div class="ri-label">优化对策</div><div class="ri">${op}</div>`:''}</div></div>`:'';

  const plans=planKeys.map(k=>row[k]).filter(Boolean);
  const sec5=plans.length?`<div class="section"><span class="stag s5">五、下周演进计划</span><div class="card">${plans.map((p,idx)=>`<div class="pi"><span class="pn">${idx+1}.</span><span class="pt2">${p}</span></div>`).join('')}</div></div>`:'';

  return `<div class="week-col">
    <div class="wh-bar" style="background:${c.bar};"></div>
    <div class="week-head"><span class="week-dot" style="background:${c.dot};"></span><span class="week-label">${row['周次']}</span><span class="week-period">${row['汇报周期']||''}</span></div>
    <div class="week-body">${sec1}${sec2}${sec3}${sec4}${sec5}</div>
  </div>`;
}

function renderKanban(data){
  const kb=document.getElementById('kanbanArea');
  // ✅ 修正：正确设置栏数，最多3栏
  kb.style.gridTemplateColumns=`repeat(${Math.min(data.length,3)},1fr)`;
  kb.innerHTML=data.map((row,i)=>renderWeekCard(row,i)).join('');
  document.getElementById('topSub').textContent=`商务中心 · 客服组 · 负责人：${data[0]['负责人']||'雨棠'} · ${data[0]['周次']}–${data[data.length-1]['周次']}`;
}

function renderCharts(data){
  const tc='rgba(255,255,255,0.3)',gc='rgba(255,255,255,0.05)';
  const labels=data.map(r=>r['周次']);
  const base={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:tc,font:{size:11}},grid:{color:gc},border:{display:false}},y:{ticks:{color:tc,font:{size:11}},grid:{color:gc},border:{display:false}}}};
  const bc=data.map((_,i)=>CHART_COLORS[i%CHART_COLORS.length]);
  if(chart1)chart1.destroy();
  if(chart2)chart2.destroy();
  chart1=new Chart(document.getElementById('c1'),{type:'bar',data:{labels,datasets:[{data:data.map(r=>r['触发次数']),backgroundColor:bc.map(c=>c+'99'),borderColor:bc,borderWidth:1,borderRadius:5}]},options:base});
  chart2=new Chart(document.getElementById('c2'),{type:'line',data:{labels,datasets:[{data:data.map(r=>r['成功率']),borderColor:'#f472b6',backgroundColor:'rgba(244,114,182,0.08)',pointBackgroundColor:'#f472b6',pointRadius:5,tension:0.3,fill:true}]},options:{...base,scales:{...base.scales,y:{...base.scales.y,min:60,max:100,ticks:{...base.scales.y.ticks,callback:v=>v+'%'}}}}});
}

function generateWeekReport(row){
  const {descKeys,resultKeys,planKeys,progTitleKeys}=getProgKeys(row);
  let r='';
  r+=`OpenClaw 自动化使用情况周报 (${row['周次']})\n`;
  r+=`汇报周期： ${row['汇报周期']||'—'}\n`;
  r+=`负责人：${row['负责人']||'雨棠'}\n`;
  r+=`项目/部门：${row['部门']||'商务中心 - 客服组'}\n`;
  r+=`\n一、运行数据概览\n`;
  r+=`◆ 活跃智能体总数：${row['活跃智能体数']}个\n`;
  r+=`◆ 本周任务触发总数：${row['触发次数']}次\n`;
  r+=`◆ 任务执行成功率：${row['成功率']}%\n`;
  r+=`◆ 字符消耗量：${Number(row['字符消耗']).toLocaleString()}\n`;
  r+=`◆ 平均响应时长：${row['平均响应']||'—'}\n`;
  r+=`\n二、核心自动化进展\n`;
  // ✅ 修正：以 progTitleKeys.length 为基准
  for(let n=0;n<progTitleKeys.length;n++){
    const t=progTitleKeys[n]?row[progTitleKeys[n]]:'';
    const d=descKeys[n]?row[descKeys[n]]:'';
    const rs=resultKeys[n]?row[resultKeys[n]]:'';
    if(!t&&!d&&!rs)continue;
    if(t)r+=`《${t}》\n`;
    if(d)r+=`◆ 描述：${d}\n`;
    if(rs)r+=`◆ 成果：${rs}\n`;
  }
  r+=`\n三、资源消耗与成本\n`;
  r+=`◆ 字符消耗量：${Number(row['字符消耗']).toLocaleString()}\n`;
  r+=`◆ 平均响应时长：${row['平均响应']||'—'}\n`;
  if(row['高频功能调用'])r+=`◆ 高频功能调用：${row['高频功能调用']}\n`;
  r+=`\n四、风险记录与优化\n`;
  if(row['异常记录'])r+=`◆ 异常记录：${row['异常记录']}\n`;
  if(row['优化对策'])r+=`◆ 优化对策：${row['优化对策']}\n`;
  const plans=planKeys.map(k=>row[k]).filter(Boolean);
  if(plans.length){r+=`\n五、下周演进计划\n`;plans.forEach(p=>r+=`◆ ${p}\n`);}
  return r.trim();
}

function generateMonthlyReport(rows){
  if(!rows||rows.length===0)return '没有可用的数据';
  const first=rows[0],last=rows[rows.length-1];
  const fp=(first['汇报周期']||'').split(/[-–]/)[0].trim();
  const lp=(last['汇报周期']||'').split(/[-–]/).pop().trim();
  const total=rows.reduce((s,r)=>s+r['触发次数'],0);
  const avgRate=(rows.reduce((s,r)=>s+r['成功率'],0)/rows.length).toFixed(2);
  const totalChar=rows.reduce((s,r)=>s+r['字符消耗'],0);
  const maxAgents=Math.max(...rows.map(r=>r['活跃智能体数']));
  const best=rows.reduce((a,b)=>a['成功率']>b['成功率']?a:b);
  let r='';
  r+=`OpenClaw 自动化使用情况月报（${first['周次']}–${last['周次']}）\n`;
  r+=`汇报周期：${fp} - ${lp}\n`;
  r+=`负责人：${first['负责人']||'雨棠'}\n`;
  r+=`项目/部门：${first['部门']||'商务中心 - 客服组'}\n`;
  r+=`\n一、运行数据总览\n`;
  r+=`◆ 活跃智能体总数：${maxAgents}个（本月最高）\n`;
  r+=`◆ 月度任务触发总数：${total.toLocaleString()}次（共 ${rows.length} 周）\n`;
  r+=`◆ 平均任务执行成功率：${avgRate}%（最高 ${best['成功率']}%，${best['周次']}）\n`;
  r+=`◆ 总字符消耗量：${totalChar.toLocaleString()}\n`;
  r+=`\n二、核心自动化进展汇总\n`;
  rows.forEach(row=>{
    const {descKeys,resultKeys,progTitleKeys}=getProgKeys(row);
    r+=`【${row['周次']}】\n`;
    // ✅ 修正：以 progTitleKeys.length 为基准
    for(let n=0;n<progTitleKeys.length;n++){
      const t=progTitleKeys[n]?row[progTitleKeys[n]]:'';
      const d=descKeys[n]?row[descKeys[n]]:'';
      const rs=resultKeys[n]?row[resultKeys[n]]:'';
      if(!t&&!d&&!rs)continue;
      if(t)r+=`《${t}》\n`;
      if(d)r+=`◆ 描述：${d}\n`;
      if(rs)r+=`◆ 成果：${rs}\n`;
    }
  });
  r+=`\n三、资源消耗汇总\n`;
  r+=`◆ 总字符消耗量：${totalChar.toLocaleString()}\n`;
  const allFuncs=[...new Set(rows.flatMap(row=>(row['高频功能调用']||'').split(/[，,、]/).map(f=>f.trim()).filter(Boolean)))];
  if(allFuncs.length)r+=`◆ 高频功能调用：${allFuncs.join('、')}\n`;
  r+=`\n四、风险记录汇总\n`;
  rows.forEach(row=>{
    if(row['异常记录']&&row['异常记录'].trim())r+=`◆ ${row['周次']} 异常记录：${row['异常记录']}\n`;
    if(row['优化对策']&&row['优化对策'].trim())r+=`◆ ${row['周次']} 优化对策：${row['优化对策']}\n`;
  });
  r+=`\n五、下月演进方向\n`;
  const allPlans=[...new Set(rows.flatMap(row=>{const {planKeys}=getProgKeys(row);return planKeys.map(k=>row[k]).filter(Boolean);}))];
  allPlans.forEach(p=>r+=`◆ ${p}\n`);
  return r.trim();
}

function generateCustomReport(rows){
  return rows.map(row=>generateWeekReport(row)).join('\n\n'+'─'.repeat(40)+'\n\n');
}

function openReport(){
  if(allData.length===0){alert('请先载入数据');return;}
  document.getElementById('modalOverlay').classList.add('show');
  buildWeekCbs();
  switchTab('week');
}

function closeReport(){document.getElementById('modalOverlay').classList.remove('show');}
function closeIfOutside(e){if(e.target===document.getElementById('modalOverlay'))closeReport();}

function buildWeekCbs(){
  document.getElementById('weekCbs').innerHTML=allData.map((row,i)=>`
    <label class="week-cb"><input type="checkbox" value="${i}" checked onchange="refreshCustom()">${row['周次']}</label>`).join('');
}

function switchTab(tab){
  currentTab=tab;
  ['week','month','custom'].forEach(t=>document.getElementById('tab-'+t).classList.toggle('active',t===tab));
  document.getElementById('customSelect').classList.toggle('show',tab==='custom');
  const btn=document.getElementById('copyBtn');
  btn.classList.remove('copied');btn.textContent='复制全文';
  if(tab==='week')document.getElementById('reportOut').textContent=generateWeekReport(allData[allData.length-1]);
  else if(tab==='month')document.getElementById('reportOut').textContent=generateMonthlyReport(allData);
  else refreshCustom();
}

function refreshCustom(){
  const checked=[...document.querySelectorAll('#weekCbs input:checked')].map(cb=>allData[parseInt(cb.value)]);
  document.getElementById('reportOut').textContent=checked.length?generateCustomReport(checked):'请至少选择一周';
}

function copyReport(){
  navigator.clipboard.writeText(document.getElementById('reportOut').textContent).then(()=>{
    const btn=document.getElementById('copyBtn');
    btn.textContent='已复制 ✓';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='复制全文';btn.classList.remove('copied');},2000);
  });
}

async function loadData(){
  setStatus('loading','读取中...');
  try{
    const res=await fetch(CSV_URL);
    if(!res.ok)throw new Error('HTTP '+res.status);
    const text=await res.text();
    const parsed=Papa.parse(text,{skipEmptyLines:true});
    const data=parseRows(parsed);
    if(!data||data.length===0)throw new Error('无数据');
    allData=data;
    renderMetrics(data);renderKanban(data);renderCharts(data);
    const now=new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
    setStatus('ok','已同步 '+now);
  }catch(e){setStatus('err','读取失败：'+e.message);}
}

loadData();
</script>
